<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证</title>
    <script src="../js/sakura.js"></script>
    <link rel="stylesheet" href="../css/loginStyle.css">
</head>

<body>
    <div class="container right-panel-active">
        <div class="container_form container--signup">
            <form action="/modifyPassword" method="post" class="form" id="form1">
                <h2 class="form_title">重设密码</h2>
                <input type="email" placeholder="邮箱" name="userEmail" class="input" maxlength="30" required="required">
                <input type="password" placeholder="新密码" class="input" name="newPassword" maxlength="30" required="required" />
                <button class="btn">修改密码</button>
            </form>
        </div>

        <div class="container_overlay">
            <div class="overlay"></div>
        </div>
    </div>


    <!-- 背景 -->
    <div class="slidershow">
        <img src="../picture/23.jpg" alt="" class="slidershow--image">
    </div>

    <!-- partial -->
    <script src="../js/login.js"></script>
</body>

</html>
