<!-- 登录 -->
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>注册登录</title>
    <link rel="stylesheet" href="../css/loginStyle.css">
</head>

<body>
    <div class="container right-panel-active">
        <!-- 注册 -->
        <div class="container_form container--signup">
            <form action="/register" method="post" class="form" id="form1">
                <h2 class="form_title">注册</h2>
                <input type="text" placeholder="用户名" class="input" name="userName" maxlength="30" required="required" />
                <input type="email" placeholder="邮箱" class="input" name="userEmail" maxlength="30" required="required" />
                <input type="password" placeholder="密码" class="input" name="userPassword" maxlength="30" required="required" />
                <button class="btn">注册</button>
            </form>
        </div>

        <!-- 登录 -->
        <div class="container_form container--signin">
            <form action="/login" method="post" class="form" id="form2">
                <h2 class="form_title">登录</h2>
                <input type="email" placeholder="邮箱" class="input" maxlength="30" name="userEmail" required="required" />
                <input type="password" placeholder="密码" class="input" maxlength="30" name="userPassword" required="required" />
                <a href="http://windserver.top/ToFindPassword" target="_blank" class="link">忘记密码？</a>
                <button class="btn">登录</button>
            </form>
        </div>

        <!-- 浮层 -->
        <div class="container_overlay">
            <div class="overlay">
                <div class="overlay_panel overlay--left">
                    <button class="btn" id="signIn">还没有账号？点击注册</button>
                </div>
                <div class="overlay_panel overlay--right">
                    <button class="btn" id="signUp">已有账号？直接登录</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 背景 -->
    <div class="slidershow">
        <img src="../picture/3.jpg" alt="" class="slidershow--image">
    </div>

    <script src="../js/sakura.js"></script>
    <script src="../js/login.js"></script>
</body>

</html>
