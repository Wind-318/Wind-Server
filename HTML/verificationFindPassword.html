<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>验证</title>
    <script src="../js/sakura.js"></script>
    <link rel="stylesheet" href="../css/verificationCodeStyle.css">
</head>

<body>
    <div>
        <form action="/verificationFind" method="post">
            <input type="email" placeholder="邮箱" class="input" name="userEmail" maxlength="30" required="required">
            <button class="btn">发送验证码</button>
        </form>
        <br><br><br>
        <form action="/ConfirmFind" method="post">
            <input type="email" placeholder="邮箱" class="input" name="userEmail" maxlength="30" required="required">
            <input type="text" placeholder="验证码" name="code" class="input" required="required" maxlength="30">
            <button class="btn">确定</button>
        </form>
    </div>
</body>

</html>
