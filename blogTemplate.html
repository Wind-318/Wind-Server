<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心</title>
    <link rel="stylesheet" href="../../css/user.css">
    <link rel="stylesheet" href="../../css/markdowncss.css">
    <script src="../../js/jquery.min.js"></script>
    <script src="../../js/blogTemplateJs.js"></script>
    <script src="../../js/marked.min.js"></script>
</head>

<body>
    <div class="navbar">
        <input type="checkbox" />
        <span></span>
        <span></span>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/blogs">博客首页</a></li>
            <li><a id="newText">新建文章</a></li>
            <li><a id="deleteText">删除文章</a></li>
            <li><a id="modifyText">修改文章</a></li>
        </ul>
    </div>
    <div class="container">
        <div class="showcase" id="container">
        </div>
    </div>

    <script>
        var btn = document.getElementById("newText");
        btn.onclick = function() {
            location.href = "/blogs/CreateText";
        }
    </script>

    <script>
        var btn = document.getElementById("deleteText");
        btn.onclick = function() {
            var arr = document.getElementById("container").children;
            var datas = new Array();
            for (var i = 0; i < arr.length; i++) {
                if (document.getElementById(arr[i].id + "checkbox").checked) {
                    datas.push(arr[i].id);
                }
            }
            $.ajax({
                url: "/blogs/DeleteBlog",
                type: "POST",
                data: {
                    "checked": JSON.stringify(datas)
                },
                success: function(data) {
                    location.reload();
                }
            })
        }
    </script>

    <script>
        // 检测键盘抬起事件
        function mdSwitch() {
            var mdValue = document.getElementById("texts").value;
            var html = marked(mdValue);
            document.getElementById("show-area").innerHTML = html;
        }
        var btn = document.getElementById("modifyText");
        btn.onclick = function() {
            var arr = document.getElementById("container").children[0];
            var datas = new Array();
            for (var i = 0; i < arr.length; i++) {
                if (document.getElementById(arr[i].id + "checkbox").checked) {
                    datas.push(arr[i].id);
                }
            }
            $.ajax({
                url: "/blogs/ModifyBlog",
                type: "POST",
                data: {
                    "checked": JSON.stringify(datas)
                },
                success: function(data) {
                    // 修改框
                    var divs = document.createElement("div");
                    divs.setAttribute("style", "z-index:10; background-color: rgba(222, 222, 222, 0.8); position: fixed; bottom: 0; flex-direction: column; display: flex; width: 100%; height: 80%;");
                    // 修改和展示框
                    var commentdiv = document.createElement("div");
                    commentdiv.setAttribute("style", "flex-direction: row; display: flex; resize: none; width: 100%; height: 85%");
                    // 修改
                    var textarea = document.createElement("textarea");
                    textarea.setAttribute("id", "texts");
                    textarea.setAttribute("onkeyup", "mdSwitch()");
                    textarea.setAttribute("maxlength", "500000");
                    textarea.setAttribute("style", "display: flex; resize: none; width: 50%; height: 100%; background-color: rgba(222, 222, 222, 0.8);");
                    // 展示框
                    var show = document.createElement("div");
                    show.setAttribute("id", "show-area");
                    show.setAttribute("style", "width: 50%; height: 100%;");
                    // 选项框
                    var titlearea = document.createElement("div");
                    titlearea.setAttribute("style", "display: flex; width: 100%; height: 15%;");
                    var btn1 = document.createElement("button");
                    btn1.setAttribute("id", "cancel");
                    btn1.setAttribute("style", "position: absolute; left: 0; width: 60px; height: 15%");
                    var btn2 = document.createElement("button");
                    btn2.setAttribute("id", "confirm");
                    btn2.setAttribute("style", "position: absolute; right: 0; width: 60px; height: 15%");
                    btn1.innerHTML = "取消";
                    btn2.innerHTML = "修改";
                    var des = document.createElement("")
                    titlearea.appendChild(btn1);
                    titlearea.appendChild(btn2);

                    commentdiv.appendChild(textarea);
                    commentdiv.appendChild(show);
                    divs.appendChild(titlearea);
                    divs.appendChild(commentdiv);
                    document.body.appendChild(divs);
                    // 添加脚本
                    var js1 = document.createElement("script");
                    var js2 = document.createElement("script");
                    js1.innerHTML = `// 取消修改
                    document.getElementById("cancel").onclick = function(ev) {
                        document.getElementById("replycomment").remove();
                    }`;
                    js2.innerHTML = `// 修改文章
                    document.getElementById("confirm").onclick = function(ev) {
                        $.ajax({
                            url: "/blogs/ModifyBlog",
                            type: "POST",
                            data: {
                                "id": "` + data["id"] + `",
                                "content": document.getElementById("texts").value
                            },
                            success: function(data) {
                                location.reload();
                            },
                            fail: function() {
                                alert("请先登录");
                            }
                        })
                    }`;
                    document.body.appendChild(js1);
                    document.body.appendChild(js2);
                }
            })
        }
    </script>
</body>

</html>
