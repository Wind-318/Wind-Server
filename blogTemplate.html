<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户中心</title>
    <link rel="stylesheet" href="css/user.css">
    <script src="../../js/jquery.min.js"></script>
    <script src="../../js/blogTemplateJs.js"></script>
</head>

<body>
    <div class="navbar">
        <input type="checkbox" />
        <span></span>
        <span></span>
        <ul>
            <li><a href="/">Home</a></li>
            <li><a href="/blogs">博客首页</a></li>
            <li><a href="/collections">收藏</a></li>
            <li><a id="deleteText">删除文章</a></li>
        </ul>
    </div>
    <div class="newtext">
        <button id="newText">
        </button>
    </div>
    <div class="container">
        <div class="showcase" id="container">
        </div>
    </div>

    <script>
        var btn = document.getElementById("newText");
        btn.onclick = function() {
            location.href = "/blogs/CreateText";
        }
    </script>

    <script>
        var btn = document.getElementById("deleteText");
        btn.onclick = function() {
            var arr = document.getElementById("container").children;
            var datas = new Array();
            for (var i = 0; i < arr.length; i++) {
                if (document.getElementById(arr[i].id + "checkbox").checked) {
                    datas.push(arr[i].id);
                }
            }
            $.ajax({
                url: "/blogs/DeleteBlog",
                type: "POST",
                data: {
                    "checked": JSON.stringify(datas)
                },
                success: function(data) {
                    location.reload();
                }
            })
        }
    </script>
</body>

</html>
